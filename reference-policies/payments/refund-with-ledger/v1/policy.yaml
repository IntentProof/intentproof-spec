schema: intentproof.policy.v1
policy_id: reference.payments.refund-with-ledger.v1
policy_version: 1
tenant_id: reference
provenance_class: platform_attested
name: Refund with ledger
description: Requires successful refund execution and ledger recording events.
spec_version: 1.0.0
scope:
  any_event_action_in:
    - payments.refund.execute
    - ledger.refund.record
  ignore_flows_with_no_match: false
instrumentation_requirement: operational
rules:
  - id: required-refund-executed
    category: required
    severity: high
    spec:
      action: payments.refund.execute
      min: 1
      where:
        status: ok
  - id: required-ledger-recorded
    category: required
    severity: high
    spec:
      action: ledger.refund.record
      min: 1
      where:
        status: ok
policy_fingerprint: sha256:503e8423cdef1c045dc9d0fd0e451645cd1a59b326df3ecad78e497a5a4da66d
signed_at: "2026-05-16T00:00:00.000Z"
signature:
