policy_id: tnt_acme.refund-flow
tenant_id: tnt_acme
policy_version: 1
spec_version: 1.0.0
scope:
  match_action: payments.stripe.refunds.create
rules:
  - id: required-execute
    type: required
    action: payments.stripe.refunds.create
    min: 1
    where: { status: ok }
  - id: forbid-double-refund
    type: forbidden
    severity: critical
    action: payments.stripe.refunds.create
    after: payments.stripe.refunds.create
    where_predecessor: { status: ok }
