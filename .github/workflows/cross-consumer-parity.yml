name: Consumer parity

# Tag-anchored parity: resolve a target spec ref (workflow_dispatch.spec_ref, else latest spec-v*
# tag), check out that commit, and compare each consumer repo's declared pin to the target. Adopted rows run
# hardening, generated-artifact verify, conformance, and stream compare; pending adoption is reported
# without failing the run unless require_full_adoption is enabled.
#
# Triggers: schedule + workflow_dispatch only (no default-branch push).

on:
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch:
    inputs:
      spec_ref:
        description: "Spec tag/branch/SHA to validate against (default: latest spec-v* tag)"
        required: false
        type: string
      require_full_adoption:
        description: "Fail if any consumer repository is not pinned to the target spec commit"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: cross-consumer-parity-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      target_ref: ${{ steps.resolve.outputs.target_ref }}
      target_commit: ${{ steps.resolve.outputs.target_commit }}
      target_version: ${{ steps.resolve.outputs.target_version }}
      require_full_adoption: ${{ steps.resolve.outputs.require_full_adoption }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`
        with:
          path: intentproof-spec
          fetch-depth: 0
          fetch-tags: true
      - name: Resolve target spec ref
        id: resolve
        working-directory: intentproof-spec
        run: |
          set -euo pipefail
          input_ref="${{ github.event.inputs.spec_ref || '' }}"
          if [[ -n "${input_ref}" ]]; then
            target_ref="${input_ref}"
          else
            target_ref="$(git tag --list 'spec-v*' --sort=-v:refname | head -n1 || true)"
            if [[ -z "${target_ref}" ]]; then
              target_ref="${GITHUB_SHA}"
            fi
          fi
          git rev-parse --verify "${target_ref}^{commit}" >/dev/null
          git checkout --quiet "${target_ref}"
          target_commit="$(git rev-parse HEAD)"
          target_version="$(python3 -c "import json;print(json.load(open('spec.json'))['version'])")"
          strict_input="${{ github.event.inputs.require_full_adoption || 'false' }}"
          case "${strict_input}" in
            true|True|TRUE|1|yes|on) strict=true ;;
            *) strict=false ;;
          esac
          {
            echo "target_ref=${target_ref}"
            echo "target_commit=${target_commit}"
            echo "target_version=${target_version}"
            echo "require_full_adoption=${strict}"
          } >> "${GITHUB_OUTPUT}"

  parity:
    needs: resolve-target
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        consumer:
          - id: node
            repo: IntentProof/intentproof-sdk-node
            path: intentproof-sdk-node
            verify: scripts/verify-generated-types.sh
            conformance: scripts/spec-conformance.sh
          - id: python
            repo: IntentProof/intentproof-sdk-python
            path: intentproof-sdk-python
            verify: scripts/verify-generated-types.sh
            conformance: scripts/spec-conformance.sh
          - id: java
            repo: IntentProof/intentproof-sdk-java
            path: intentproof-sdk-java
            verify: scripts/verify-generated-pojos.sh
            conformance: scripts/spec-conformance.sh

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`
        with:
          path: intentproof-spec
          ref: ${{ needs.resolve-target.outputs.target_ref }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`
        with:
          repository: ${{ matrix.consumer.repo }}
          path: ${{ matrix.consumer.path }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # was `@v6`
        with:
          node-version-file: intentproof-spec/.nvmrc
          cache: npm
          cache-dependency-path: intentproof-spec/package-lock.json

      - name: Consumer hardening contract audit
        run: |
          bash intentproof-spec/scripts/check-consumer-hardening.sh "${{ github.workspace }}/${{ matrix.consumer.path }}"

      - name: Classify consumer adoption for target spec ref
        id: adoption
        run: |
          set -euo pipefail
          consumer_root="${{ github.workspace }}/${{ matrix.consumer.path }}"
          target_commit="${{ needs.resolve-target.outputs.target_commit }}"
          pinned_commit="$(bash intentproof-spec/scripts/read-consumer-spec-commit.sh "${consumer_root}")"
          if [[ "${pinned_commit}" == "${target_commit}" ]]; then
            adopted=true
          else
            adopted=false
          fi
          {
            echo "pinned_commit=${pinned_commit}"
            echo "adopted=${adopted}"
          } >> "${GITHUB_OUTPUT}"
          cat > "${{ matrix.consumer.path }}/parity-meta.json" <<JSON
          {
            "consumerId": "${{ matrix.consumer.id }}",
            "targetRef": "${{ needs.resolve-target.outputs.target_ref }}",
            "targetCommit": "${target_commit}",
            "targetVersion": "${{ needs.resolve-target.outputs.target_version }}",
            "pinnedCommit": "${pinned_commit}",
            "adopted": ${adopted}
          }
          JSON

      - name: Upload parity metadata artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # was `@v7`
        with:
          name: parity-meta-${{ matrix.consumer.id }}
          path: ${{ matrix.consumer.path }}/parity-meta.json
          if-no-files-found: error

      - name: Pending adoption note
        if: steps.adoption.outputs.adopted != 'true'
        run: |
          {
            echo "Consumer ${{ matrix.consumer.id }} is pending adoption for target spec ref."
            echo "Pinned commit: ${{ steps.adoption.outputs.pinned_commit }}"
            echo "Target commit: ${{ needs.resolve-target.outputs.target_commit }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Set up Java (parity verify)
        if: matrix.consumer.id == 'java' && steps.adoption.outputs.adopted == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # was `@v5`
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (parity verify)
        if: matrix.consumer.id == 'java' && steps.adoption.outputs.adopted == 'true'
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # was `@v6`

      - name: Verify generated artifacts are up to date
        if: steps.adoption.outputs.adopted == 'true'
        working-directory: ${{ matrix.consumer.path }}
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
        run: bash "${{ matrix.consumer.verify }}"

      - name: Run spec conformance from consumer checkout
        if: steps.adoption.outputs.adopted == 'true'
        working-directory: ${{ matrix.consumer.path }}
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
          INTENTPROOF_REPLAY_VERIFY: "1"
          INTENTPROOF_CONFORMANCE_JSON: "1"
          INTENTPROOF_SPEC_INTEGRITY_PUBLIC_KEY_PEM: ${{ secrets.INTENTPROOF_SPEC_INTEGRITY_PUBLIC_KEY_PEM }}
          INTENTPROOF_CERTIFICATE_SIGNING_KEY_PEM: ${{ secrets.INTENTPROOF_CERTIFICATE_SIGNING_KEY_PEM }}
          INTENTPROOF_CERTIFICATE_SIGNING_KEY_ID: intentproof-ci-ed25519-v1
        run: |
          set -euo pipefail
          bash "${{ matrix.consumer.conformance }}" | tee conformance.log
          python3 - <<'PY'
          import json
          import pathlib
          import re

          log = pathlib.Path("conformance.log").read_text(encoding="utf-8")
          json_lines = [
              ln for ln in log.splitlines() if re.match(r'^\s*\{.*\}\s*$', ln)
          ]
          if not json_lines:
              raise SystemExit("missing conformance JSON line in output")
          report = None
          for ln in reversed(json_lines):
              obj = json.loads(ln)
              res = obj.get("results")
              if isinstance(res, dict) and "schemaValidation" in res:
                  report = obj
                  break
          if report is None:
              raise SystemExit("missing conformance report JSON in output (expected results.schemaValidation)")
          results = report.get("results", {})
          norm = {
              "specVersion": report.get("specVersion"),
              "specFingerprint": report.get("specFingerprint"),
              "results": results,
          }
          pathlib.Path("parity-stream.jsonl").write_text(
              json.dumps(norm, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY

      # secrets context is not allowed in step `if:`; pass PEMs via env and verify in shell.
      - name: Require certificate secrets for parity validation
        if: steps.adoption.outputs.adopted == 'true'
        env:
          INTENTPROOF_CERTIFICATE_SIGNING_KEY_PEM: ${{ secrets.INTENTPROOF_CERTIFICATE_SIGNING_KEY_PEM }}
          INTENTPROOF_CERTIFICATE_PUBLIC_KEY_PEM: ${{ secrets.INTENTPROOF_CERTIFICATE_PUBLIC_KEY_PEM }}
        run: |
          if [[ -z "${INTENTPROOF_CERTIFICATE_SIGNING_KEY_PEM}" || -z "${INTENTPROOF_CERTIFICATE_PUBLIC_KEY_PEM}" ]]; then
            echo '::error::Configure INTENTPROOF_CERTIFICATE_SIGNING_KEY_PEM and INTENTPROOF_CERTIFICATE_PUBLIC_KEY_PEM on intentproof-spec for adopted parity rows (signed certificate validation).'
            exit 1
          fi

      - name: Validate conformance certificate (spec tree)
        if: steps.adoption.outputs.adopted == 'true'
        working-directory: intentproof-spec
        env:
          INTENTPROOF_CERTIFICATE_PUBLIC_KEY_PEM: ${{ secrets.INTENTPROOF_CERTIFICATE_PUBLIC_KEY_PEM }}
          INTENTPROOF_CERTIFICATE_REQUIRE_SIGNATURE: "1"
        run: npm run validate:conformance-certificate

      - name: Upload spec conformance artifacts
        if: steps.adoption.outputs.adopted == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # was `@v7`
        with:
          name: conformance-artifacts-${{ matrix.consumer.id }}
          path: |
            intentproof-spec/conformance-report.json
            intentproof-spec/conformance-certificate.json
          if-no-files-found: error

      - name: Upload parity stream artifact
        if: steps.adoption.outputs.adopted == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # was `@v7`
        with:
          name: parity-stream-${{ matrix.consumer.id }}
          path: ${{ matrix.consumer.path }}/parity-stream.jsonl
          if-no-files-found: error

  aggregate-compare:
    runs-on: ubuntu-latest
    needs: [resolve-target, parity]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # was `@v6`
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --no-fund

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # was `@v8`
        with:
          name: parity-stream-node
          path: parity-streams/node
          if-no-artifact-found: ignore
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # was `@v8`
        with:
          name: parity-stream-python
          path: parity-streams/python
          if-no-artifact-found: ignore
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # was `@v8`
        with:
          name: parity-stream-java
          path: parity-streams/java
          if-no-artifact-found: ignore

      - name: Compare consumer output streams centrally
        run: |
          set -euo pipefail
          streams=(
            parity-streams/node/parity-stream.jsonl
            parity-streams/python/parity-stream.jsonl
            parity-streams/java/parity-stream.jsonl
          )
          present=0
          for f in "${streams[@]}"; do
            if [[ -f "${f}" ]]; then
              present=$((present + 1))
            fi
          done
          if [[ "${present}" -lt 3 ]]; then
            {
              echo "## Consumer parity stream compare skipped"
              echo ""
              echo "Target ref: \`${{ needs.resolve-target.outputs.target_ref }}\`"
              echo "Reason: one or more consumers are pending adoption for target commit."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          npm exec -- tsx tools/replay/compare-streams.ts \
            parity-streams/node/parity-stream.jsonl \
            parity-streams/python/parity-stream.jsonl \
            parity-streams/java/parity-stream.jsonl

  adoption-summary:
    runs-on: ubuntu-latest
    needs: [resolve-target, parity]
    if: always()
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # was `@v8`
        with:
          pattern: parity-meta-*
          path: parity-meta
          if-no-artifact-found: ignore
      - name: Emit adoption matrix summary
        env:
          TARGET_REF: ${{ needs.resolve-target.outputs.target_ref }}
          TARGET_COMMIT: ${{ needs.resolve-target.outputs.target_commit }}
          TARGET_VERSION: ${{ needs.resolve-target.outputs.target_version }}
          REQUIRE_FULL_ADOPTION: ${{ needs.resolve-target.outputs.require_full_adoption }}
        run: |
          set -euo pipefail
          {
            echo "## Target spec parity adoption"
            echo ""
            echo "- Target ref: \`${TARGET_REF}\`"
            echo "- Target commit: \`${TARGET_COMMIT}\`"
            echo "- Target version: \`${TARGET_VERSION}\`"
            echo "- Require full adoption: \`${REQUIRE_FULL_ADOPTION}\`"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"
          python3 - <<'PY' >> "${GITHUB_STEP_SUMMARY}"
          import json
          from pathlib import Path

          root = Path("parity-meta")
          rows = []
          if root.exists():
            for path in sorted(root.rglob("parity-meta.json")):
              rows.append(json.loads(path.read_text(encoding="utf-8")))

          print("| Consumer | Pinned commit | Adopted |")
          print("| --- | --- | --- |")
          for row in rows:
              adopted = "yes" if row.get("adopted") else "no (pending)"
              cid = row.get("consumerId") or row.get("sdk")
              pc = row.get("pinnedCommit") or row.get("sdkPinnedCommit")
              print(f"| {cid} | `{pc}` | {adopted} |")
          PY

  enforce-full-adoption:
    runs-on: ubuntu-latest
    needs: [resolve-target, parity]
    if: needs.resolve-target.outputs.require_full_adoption == 'true'
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # was `@v8`
        with:
          pattern: parity-meta-*
          path: parity-meta
          if-no-artifact-found: ignore
      - name: Enforce adoption completeness
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          rows = []
          for path in sorted(Path("parity-meta").rglob("parity-meta.json")):
              rows.append(json.loads(path.read_text(encoding="utf-8")))

          pending = [r for r in rows if not r.get("adopted")]
          if pending:
              print("::error::Full adoption required, but consumers are still pending:")
              for row in pending:
                  cid = row.get("consumerId") or row.get("sdk")
                  pc = row.get("pinnedCommit") or row.get("sdkPinnedCommit")
                  print(
                      f"::error::{cid} pinned {pc} "
                      f"!= target {row.get('targetCommit')}"
                  )
              raise SystemExit(1)
          print("Full adoption requirement satisfied.")
          PY
