name: codeql
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
permissions:
  actions: read
  contents: read
  security-events: write
jobs:
  allowlist-expiry:
    name: "IntentProof Security: CodeQL Allowlist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash ./scripts/check-codeql-allowlist.sh
  gitleaks:
    name: "IntentProof Security: Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: v8.24.2
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_8.24.2_linux_x64.tar.gz" \
            | tar -xzf - gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml
  analyze:
    name: "IntentProof Security: CodeQL (${{ matrix.language }})"
    needs: allowlist-expiry
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
