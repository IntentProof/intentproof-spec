name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  allowlist-expiry:
    name: "IntentProof Security: CodeQL Allowlist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate allowlist expiry dates
        run: bash ./scripts/check-codeql-allowlist.sh

  gitleaks:
    name: "IntentProof Security: Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  analyze:
    name: "IntentProof Security: CodeQL (${{ matrix.language }})"
    needs: allowlist-expiry
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout intentproof-tools for custom query pack
        uses: actions/checkout@v4
        with:
          repository: IntentProof/intentproof-tools
          ref: 552da9dc027962c88b62bca96103f24b9573563e
          path: intentproof-tools
          sparse-checkout: |
            codeql/intentproof-extra
          sparse-checkout-cone-mode: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality,./intentproof-tools/codeql/intentproof-extra

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
