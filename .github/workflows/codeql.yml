name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  allowlist-expiry:
    name: "IntentProof Security: CodeQL Allowlist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate allowlist expiry dates
        run: bash ./scripts/check-codeql-allowlist.sh

  gitleaks:
    name: "IntentProof Security: Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz" \
            | tar -xz
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --verbose --redact

  analyze:
    name: "IntentProof Security: CodeQL (${{ matrix.language }})"
    needs: allowlist-expiry
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Checkout intentproof-tools for custom query pack
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: IntentProof/intentproof-tools
          ref: b4c7cb147404238c59388c9fc7de963d69bc2bb3
          path: intentproof-tools
          sparse-checkout: |
            codeql/intentproof-extra-javascript
          sparse-checkout-cone-mode: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@78ed0c7291d93e40c51b085850dc669a4c3ab73b
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality,./intentproof-tools/codeql/intentproof-extra-javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@78ed0c7291d93e40c51b085850dc669a4c3ab73b
        with:
          category: "/language:${{ matrix.language }}"
