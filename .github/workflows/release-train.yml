name: Release Train

on:
  push:
    tags:
      - "spec-v*"
  workflow_dispatch:
    inputs:
      spec_ref:
        description: "Spec tag/branch/SHA to propagate (default: latest spec-v* tag)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-train-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      target_ref: ${{ steps.resolve.outputs.target_ref }}
      target_commit: ${{ steps.resolve.outputs.target_commit }}
      target_version: ${{ steps.resolve.outputs.target_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: intentproof-spec
          fetch-depth: 0
          fetch-tags: true
      - name: Resolve target spec ref
        id: resolve
        working-directory: intentproof-spec
        run: |
          set -euo pipefail
          input_ref="${{ github.event.inputs.spec_ref || '' }}"
          if [[ -n "${input_ref}" ]]; then
            target_ref="${input_ref}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            target_ref="${GITHUB_REF_NAME}"
          else
            target_ref="$(git tag --list 'spec-v*' --sort=-v:refname | head -n1 || true)"
            if [[ -z "${target_ref}" ]]; then
              target_ref="${GITHUB_SHA}"
            fi
          fi
          git rev-parse --verify "${target_ref}^{commit}" >/dev/null
          git checkout --quiet "${target_ref}"
          target_commit="$(git rev-parse HEAD)"
          target_version="$(python3 -c "import json;print(json.load(open('spec.json'))['version'])")"
          {
            echo "target_ref=${target_ref}"
            echo "target_commit=${target_commit}"
            echo "target_version=${target_version}"
          } >> "${GITHUB_OUTPUT}"

  pin-bump-prs:
    needs: resolve-target
    runs-on: ubuntu-latest
    if: ${{ vars.INTENTPROOF_BOT_APP_ID != '' }}
    strategy:
      fail-fast: false
      matrix:
        repo:
          - id: node
            repository: IntentProof/intentproof-sdk-node
            workdir: intentproof-sdk-node
          - id: python
            repository: IntentProof/intentproof-sdk-python
            workdir: intentproof-sdk-python
          - id: java
            repository: IntentProof/intentproof-sdk-java
            workdir: intentproof-sdk-java
          - id: api
            repository: IntentProof/intentproof-api
            workdir: intentproof-api
    steps:
      - uses: actions/checkout@v6
        with:
          path: intentproof-spec
          ref: ${{ needs.resolve-target.outputs.target_ref }}
          fetch-depth: 1

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.INTENTPROOF_BOT_APP_ID }}
          private-key: ${{ secrets.INTENTPROOF_BOT_APP_PRIVATE_KEY }}
          owner: IntentProof
          repositories: |
            intentproof-sdk-node
            intentproof-sdk-python
            intentproof-sdk-java
            intentproof-api

      - uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo.repository }}
          token: ${{ steps.app-token.outputs.token }}
          path: ${{ matrix.repo.workdir }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git -C "${{ matrix.repo.workdir }}" config user.name "intentproof-bot"
          git -C "${{ matrix.repo.workdir }}" config user.email "intentproof-bot@users.noreply.github.com"

      - name: Update consumer repository spec pins
        env:
          PIN_TARGET_ID: ${{ matrix.repo.id }}
          REPO_WORKDIR: ${{ matrix.repo.workdir }}
          TARGET_COMMIT: ${{ needs.resolve-target.outputs.target_commit }}
          TARGET_VERSION: ${{ needs.resolve-target.outputs.target_version }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import tomllib
          from pathlib import Path

          pin_target = os.environ["PIN_TARGET_ID"]
          root = Path(os.environ["REPO_WORKDIR"])
          target_version = os.environ["TARGET_VERSION"]
          target_commit = os.environ["TARGET_COMMIT"]

          if pin_target == "node":
              for p in [root / "package.json", root / "packages/sdk/package.json"]:
                  data = json.loads(p.read_text(encoding="utf-8"))
                  data["intentproofSpecVersion"] = target_version
                  data["intentproofSpecCommit"] = target_commit
                  p.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
              fp = root / "packages/sdk/src/generated/spec_fingerprint.json"
              if fp.exists():
                  data = json.loads(fp.read_text(encoding="utf-8"))
                  data["specVersion"] = target_version
                  fp.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          elif pin_target in ("python", "api"):
              pyproject = root / "pyproject.toml"
              text = pyproject.read_text(encoding="utf-8")
              old = tomllib.loads(text)
              old_v = old["tool"]["intentproof"]["spec-version"]
              old_c = old["tool"]["intentproof"]["spec-commit"]
              text = text.replace(f'spec-version = "{old_v}"', f'spec-version = "{target_version}"')
              text = text.replace(f'spec-commit = "{old_c}"', f'spec-commit = "{target_commit}"')
              pyproject.write_text(text, encoding="utf-8")
              fp_paths = {
                  "python": root / "src/intentproof/generated/spec_fingerprint.json",
                  "api": root / "app/generated/spec_fingerprint.json",
              }
              fp = fp_paths.get(pin_target)
              if fp and fp.exists():
                  data = json.loads(fp.read_text(encoding="utf-8"))
                  data["specVersion"] = target_version
                  fp.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          elif pin_target == "java":
              props = root / "gradle.properties"
              out = []
              for line in props.read_text(encoding="utf-8").splitlines():
                  if line.startswith("intentproofSpecVersion="):
                      out.append(f"intentproofSpecVersion={target_version}")
                  elif line.startswith("intentproofSpecCommit="):
                      out.append(f"intentproofSpecCommit={target_commit}")
                  else:
                      out.append(line)
              props.write_text("\n".join(out) + "\n", encoding="utf-8")
          else:
              raise SystemExit(f"unknown pin target {pin_target}")
          PY

      - name: Refresh generated artifacts
        env:
          PIN_TARGET_ID: ${{ matrix.repo.id }}
          REPO_WORKDIR: ${{ matrix.repo.workdir }}
          TARGET_COMMIT: ${{ needs.resolve-target.outputs.target_commit }}
          TARGET_VERSION: ${{ needs.resolve-target.outputs.target_version }}
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
        run: |
          set -euo pipefail
          case "${PIN_TARGET_ID}" in
            node)
              npm --prefix "${REPO_WORKDIR}" ci
              npm --prefix "${REPO_WORKDIR}" run sync-readme -w @intentproof/sdk
              bash "${REPO_WORKDIR}/scripts/generate-schema-types.sh"
              npm --prefix "${REPO_WORKDIR}" run format -w @intentproof/sdk
              ;;
            python)
              python3 -m pip install -e "${REPO_WORKDIR}[dev]"
              INTENTPROOF_SPEC_ROOT="${INTENTPROOF_SPEC_ROOT}" \
                python3 "${REPO_WORKDIR}/scripts/generate_schema_models.py"
              python3 -m ruff format "${REPO_WORKDIR}/src/intentproof/generated"
              ;;
            api)
              python3 -m pip install -e "${REPO_WORKDIR}[dev]"
              INTENTPROOF_SPEC_ROOT="${INTENTPROOF_SPEC_ROOT}" \
                python3 "${REPO_WORKDIR}/scripts/generate_spec_models.py"
              python3 -m ruff format "${REPO_WORKDIR}/app/generated"
              ;;
            java)
              # No additional generation needed for spec pin-only bumps.
              ;;
            *)
              echo "unknown pin target ${PIN_TARGET_ID}" >&2
              exit 2
              ;;
          esac

      - name: Create or update bump PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_REF: ${{ needs.resolve-target.outputs.target_ref }}
          TARGET_COMMIT: ${{ needs.resolve-target.outputs.target_commit }}
          TARGET_VERSION: ${{ needs.resolve-target.outputs.target_version }}
          PIN_TARGET_LABEL: ${{ matrix.repo.id }}
        run: |
          set -euo pipefail
          repo="${{ matrix.repo.repository }}"
          workdir="${{ matrix.repo.workdir }}"
          branch="bot/spec-pin-${TARGET_VERSION}"

          if git -C "${workdir}" diff --quiet; then
            echo "No changes for ${repo}; skipping PR."
            exit 0
          fi

          git -C "${workdir}" checkout -B "${branch}"
          git -C "${workdir}" add -A
          git -C "${workdir}" commit -m "chore(spec): adopt ${TARGET_VERSION} pin"
          git -C "${workdir}" push -u origin "${branch}" --force-with-lease

          existing="$(gh pr list --repo "${repo}" --head "${branch}" --base main --json number --jq '.[0].number' || true)"
          if [[ -n "${existing}" && "${existing}" != "null" ]]; then
            echo "PR already exists for ${repo}:${branch}"
          else
            pr_body_file="$(mktemp)"
            printf '%s\n' \
              "## Summary" \
              "- update **${PIN_TARGET_LABEL}** repository spec pin to \`${TARGET_VERSION}\`" \
              "- set spec commit to \`${TARGET_COMMIT}\`" \
              "- refresh generated artifacts when applicable (fingerprints, generated models, etc.)" \
              "" \
              "## Source" \
              "- target spec ref: \`${TARGET_REF}\`" \
              "" \
              "## Test plan" \
              "- [ ] CI passes for this repository" \
              "- [ ] generated-artifact / drift checks pass" \
              > "${pr_body_file}"

            gh pr create \
              --repo "${repo}" \
              --base main \
              --head "${branch}" \
              --title "chore(spec): adopt ${TARGET_VERSION} pin" \
              --body-file "${pr_body_file}"
          fi

  missing-token-note:
    needs: resolve-target
    runs-on: ubuntu-latest
    if: ${{ vars.INTENTPROOF_BOT_APP_ID == '' }}
    steps:
      - name: Emit setup note
        run: |
          {
            echo "## Release train skipped"
            echo ""
            echo "Org variable \`INTENTPROOF_BOT_APP_ID\` is not set."
            echo "Configure the GitHub App install for downstream repositories (SDKs and API), then set:"
            echo "- Variable: \`INTENTPROOF_BOT_APP_ID\` (App ID)"
            echo "- Secret: \`INTENTPROOF_BOT_APP_PRIVATE_KEY\` (PEM from the app)"
          } >> "${GITHUB_STEP_SUMMARY}"
