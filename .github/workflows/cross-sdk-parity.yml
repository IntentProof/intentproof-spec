name: Cross-SDK Parity

# SDK conformance/hardening requires each SDK's declared intentproofSpecCommit to equal this repo's
# checkout HEAD (the triggering ref). After advancing intentproof-spec/main, merge SDK PRs that bump
# pins before expecting this workflow to pass.
#
# Triggers:
# - pull_request: same normative paths as push — runs parity plus each SDK's native CI gate (tests/build).
# - push (default branch): normative paths only — parity stream compare without duplicating full SDK CI.
# - schedule / workflow_dispatch: full parity (same as push; no native gates).

on:
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "schema/**"
      - "golden/**"
      - "tests/conformance/**"
      - "tests/lib/semantics.ts"
      - "spec.json"
      - "scripts/run-conformance.sh"
      - ".github/workflows/cross-sdk-parity.yml"
  push:
    branches: [main, master]
    paths:
      - "schema/**"
      - "golden/**"
      - "tests/conformance/**"
      - "tests/lib/semantics.ts"
      - "spec.json"
      - "scripts/run-conformance.sh"
      - ".github/workflows/cross-sdk-parity.yml"

permissions:
  contents: read

concurrency:
  group: cross-sdk-parity-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - id: node
            repo: IntentProof/intentproof-sdk-node
            path: intentproof-sdk-node
            verify: scripts/verify-generated-types.sh
            conformance: scripts/spec-conformance.sh
          - id: python
            repo: IntentProof/intentproof-sdk-python
            path: intentproof-sdk-python
            verify: scripts/verify-generated-types.sh
            conformance: scripts/spec-conformance.sh
          - id: java
            repo: IntentProof/intentproof-sdk-java
            path: intentproof-sdk-java
            verify: scripts/verify-generated-pojos.sh
            conformance: scripts/spec-conformance.sh

    steps:
      - uses: actions/checkout@v6
        with:
          path: intentproof-spec

      - uses: actions/checkout@v6
        with:
          repository: ${{ matrix.sdk.repo }}
          path: ${{ matrix.sdk.path }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: intentproof-spec/.nvmrc
          cache: npm
          cache-dependency-path: intentproof-spec/package-lock.json

      - name: SDK hardening contract audit
        run: |
          bash intentproof-spec/scripts/check-sdk-hardening.sh "${{ github.workspace }}/${{ matrix.sdk.path }}"

      - name: Verify generated artifacts are up to date
        working-directory: ${{ matrix.sdk.path }}
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
        run: bash "${{ matrix.sdk.verify }}"

      - name: Run spec conformance from SDK
        working-directory: ${{ matrix.sdk.path }}
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
          INTENTPROOF_REPLAY_VERIFY: "1"
          INTENTPROOF_CONFORMANCE_JSON: "1"
        run: |
          set -euo pipefail
          bash "${{ matrix.sdk.conformance }}" | tee conformance.log
          python3 - <<'PY'
          import json
          import pathlib
          import re

          log = pathlib.Path("conformance.log").read_text(encoding="utf-8")
          json_lines = [
              ln for ln in log.splitlines() if re.match(r'^\s*\{.*\}\s*$', ln)
          ]
          if not json_lines:
              raise SystemExit("missing conformance JSON line in output")
          report = json.loads(json_lines[-1])
          results = report.get("results", {})
          norm = {
              "specVersion": report.get("specVersion"),
              "specFingerprint": report.get("specFingerprint"),
              "results": results,
          }
          pathlib.Path("parity-stream.jsonl").write_text(
              json.dumps(norm, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY

      - name: Upload parity stream artifact
        uses: actions/upload-artifact@v7
        with:
          name: parity-stream-${{ matrix.sdk.id }}
          path: ${{ matrix.sdk.path }}/parity-stream.jsonl
          if-no-files-found: error

      # PRs touching normative paths also run each SDK repo's main CI gate (parity with sdk repos'
      # native workflows). Push-to-main / schedule runs skip this to avoid noise and pin churn on docs-only landings.
      - name: Set up Java (PR native checks)
        if: github.event_name == 'pull_request' && matrix.sdk.id == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (PR native checks)
        if: github.event_name == 'pull_request' && matrix.sdk.id == 'java'
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Python (PR native checks)
        if: github.event_name == 'pull_request' && matrix.sdk.id == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: SDK native CI gate (pull_request only)
        if: github.event_name == 'pull_request'
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
        run: |
          set -euo pipefail
          sdk_root="${{ github.workspace }}/${{ matrix.sdk.path }}"
          case "${{ matrix.sdk.id }}" in
            node)
              cd "$sdk_root"
              if ! cmp -s README.md packages/sdk/README.md; then
                echo "::error::packages/sdk/README.md is out of sync with README.md at the repo root. From the repo root run: npm run sync-readme — then commit packages/sdk/README.md"
                exit 1
              fi
              npm ci
              npm run ci
              ;;
            python)
              cd "$sdk_root"
              python -m pip install -U pip
              python -m pip install -e ".[dev]"
              python -m pytest tests \
                --cov=intentproof \
                --cov-report=term-missing \
                --cov-fail-under=100
              ;;
            java)
              cd "$sdk_root"
              ./gradlew --no-daemon check
              ;;
          esac

  aggregate-compare:
    runs-on: ubuntu-latest
    needs: parity
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --no-fund

      - uses: actions/download-artifact@v8
        with:
          name: parity-stream-node
          path: parity-streams/node
      - uses: actions/download-artifact@v8
        with:
          name: parity-stream-python
          path: parity-streams/python
      - uses: actions/download-artifact@v8
        with:
          name: parity-stream-java
          path: parity-streams/java

      - name: Compare SDK output streams centrally
        run: |
          npm exec -- tsx tools/replay/compare-streams.ts \
            parity-streams/node/parity-stream.jsonl \
            parity-streams/python/parity-stream.jsonl \
            parity-streams/java/parity-stream.jsonl
