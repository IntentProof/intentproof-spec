name: release signing dry run

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: SemVer version to place in dry-run attestations.
        required: true
        default: 0.0.0-dryrun
        type: string
      release_ref:
        description: Git ref to check out for the dry run.
        required: true
        default: refs/heads/main
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build-spec-bundle:
    name: "IntentProof Release: Build Spec Bundle"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.release_ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run spec verification
        run: npm test

      - name: Build dry-run spec release bundle
        run: |
          set -euo pipefail
          mkdir -p dist
          tar \
            --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -czf dist/intentproof-spec-dryrun.tar.gz \
            schema \
            golden \
            compatibility \
            integrity/manifest.v1.json \
            integrity/manifest.v1.json.sig \
            well-known-keys/spec-integrity.pem

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: spec-release-dry-run
          path: dist/intentproof-spec-dryrun.tar.gz

  sign-spec-bundle:
    name: "IntentProof Release: Sign Spec Bundle"
    needs: build-spec-bundle
    uses: IntentProof/intentproof-tools/.github/workflows/release-build-sign.yml@317387a9724787e4ac484f39de46d7e559b6c98d
    with:
      artifact_kind: generic
      subject_name: intentproof-spec-dryrun
      release_version: ${{ inputs.release_version }}
      release_ref: ${{ inputs.release_ref }}
      artifact_paths: dist/intentproof-spec-dryrun.tar.gz
      artifact_download_name: spec-release-dry-run
      artifact_download_path: dist
      attest_to_rekor: false
