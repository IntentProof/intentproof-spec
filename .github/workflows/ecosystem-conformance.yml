name: ecosystem-conformance

on:
  pull_request:
    branches: [main]
    paths:
      - 'schema/**'
      - 'golden/**'
      - 'reference-policies/**'
      - 'compatibility/**'
      - 'conformance/**'
      - 'scripts/run-ecosystem-conformance.sh'
      - 'scripts/check-ecosystem-pins.sh'
      - '.github/workflows/ecosystem-conformance.yml'
  push:
    branches: [main]
    paths:
      - 'schema/**'
      - 'golden/**'
      - 'reference-policies/**'
      - 'compatibility/**'
      - 'conformance/**'
      - 'scripts/run-ecosystem-conformance.sh'
      - 'scripts/check-ecosystem-pins.sh'
      - '.github/workflows/ecosystem-conformance.yml'
  workflow_dispatch:

jobs:
  ecosystem-conformance:
    name: "IntentProof CI: Ecosystem Conformance"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Install spec dependencies
        run: npm ci

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: IntentProof/intentproof-tools
          ref: main
          path: intentproof-tools

      - name: Prefer sibling PR branch for tools
        if: github.event_name == 'pull_request'
        env:
          PR_SIBLING_BRANCH: ${{ github.head_ref }}
        run: bash scripts/prefer-pr-sibling-ref.sh intentproof-tools "$PR_SIBLING_BRANCH"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: IntentProof/intentproof-core
          ref: main
          path: intentproof-core

      - name: Prefer sibling PR branch for core
        if: github.event_name == 'pull_request'
        env:
          PR_SIBLING_BRANCH: ${{ github.head_ref }}
        run: bash scripts/prefer-pr-sibling-ref.sh intentproof-core "$PR_SIBLING_BRANCH"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: IntentProof/intentproof-sdk-node
          ref: main
          path: intentproof-sdk-node

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: IntentProof/intentproof-sdk-python
          ref: main
          path: intentproof-sdk-python

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: IntentProof/intentproof-sdk-go
          ref: main
          path: intentproof-sdk-go

      - name: Prefer go SDK topic branch when signing golden not on main
        run: |
          if [[ -f intentproof-sdk-go/scripts/check-sdk-signing-fixtures-sync.sh ]]; then
            exit 0
          fi
          git -C intentproof-sdk-go fetch origin phase3-sdk-signing-golden 2>/dev/null || exit 0
          git -C intentproof-sdk-go checkout FETCH_HEAD

      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
        with:
          go-version-file: intentproof-tools/go.mod

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: Run ecosystem conformance at current tuple
        env:
          INTENTPROOF_TOOLS_DIR: intentproof-tools
          INTENTPROOF_CORE_DIR: intentproof-core
          INTENTPROOF_SDK_NODE_DIR: intentproof-sdk-node
          INTENTPROOF_SDK_PYTHON_DIR: intentproof-sdk-python
          INTENTPROOF_SDK_GO_DIR: intentproof-sdk-go
        run: bash scripts/run-ecosystem-conformance.sh
