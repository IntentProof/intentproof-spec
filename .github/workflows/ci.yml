name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: "IntentProof CI: Build and Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage gate
        run: |
          npm run test:coverage
          bash scripts/check-coverage.sh

      - name: Verify compatibility tuple alignment
        run: npm run compatibility-pins-verify

  counterparty-golden:
    name: "IntentProof CI: Counterparty Golden"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: IntentProof/intentproof-tools
          ref: main
          path: intentproof-tools

      - name: Prefer tools bundle profile branch when gate not on main
        run: bash scripts/prefer-tools-bundle-profile-ref.sh intentproof-tools

      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
        with:
          go-version-file: intentproof-tools/go.mod

      - name: Verify counterparty golden bundle stdout
        env:
          INTENTPROOF_TOOLS_DIR: intentproof-tools
        run: bash scripts/check-counterparty-golden.sh .

  ecosystem-pins:
    name: "IntentProof CI: Ecosystem Pins"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: IntentProof/intentproof-tools
          ref: main
          path: intentproof-tools

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: IntentProof/intentproof-core
          ref: main
          path: intentproof-core

      - name: Prefer sibling PR branch for tools
        if: github.event_name == 'pull_request'
        env:
          PR_SIBLING_BRANCH: ${{ github.head_ref }}
        run: bash scripts/prefer-pr-sibling-ref.sh intentproof-tools "$PR_SIBLING_BRANCH"

      - name: Prefer tools bundle profile branch when gate not on main
        run: bash scripts/prefer-tools-bundle-profile-ref.sh intentproof-tools

      - name: Verify ecosystem pin alignment
        env:
          INTENTPROOF_TOOLS_DIR: intentproof-tools
          INTENTPROOF_CORE_DIR: intentproof-core
        run: bash scripts/check-ecosystem-pins.sh
