name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: "IntentProof CI: Build and Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage gate
        run: |
          npm run test:coverage
          bash scripts/check-coverage.sh coverage/coverage-final.json 95

  counterparty-golden:
    name: "IntentProof CI: Counterparty Golden"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: IntentProof/intentproof-tools
          ref: main
          path: intentproof-tools

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: intentproof-tools/go.mod

      - name: Verify counterparty golden bundle stdout
        env:
          INTENTPROOF_TOOLS_DIR: intentproof-tools
        run: bash scripts/check-counterparty-golden.sh .
