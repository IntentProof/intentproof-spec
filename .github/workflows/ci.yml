name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  parity-policy-note:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect normative-path changes
        id: changes
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" --depth=200
          changed="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD || true)"
          echo "$changed"
          if printf '%s\n' "$changed" | grep -Eq '^(schema/|golden/|tests/conformance/|tests/lib/semantics\.ts$|spec\.json$|scripts/run-conformance\.sh$|tools/conformance-certificate\.ts$|tools/validate-conformance-certificate\.ts$|\.github/workflows/cross-sdk-parity\.yml$)'; then
            echo "normative=true" >> "${GITHUB_OUTPUT}"
          else
            echo "normative=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Emit parity policy note
        if: steps.changes.outputs.normative == 'true'
        run: |
          {
            echo "## Cross-SDK parity policy"
            echo ""
            echo "This PR modifies normative spec paths."
            echo "Cross-SDK parity runs on \`schedule\` and"
            echo "\`workflow_dispatch\` only (not on pull_request or push)."
            echo "After merge, land SDK pin+generated updates, then run parity"
            echo "manually (or wait for the weekly scheduled run)."
          } >> "${GITHUB_STEP_SUMMARY}"

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          set -euo pipefail
          shopt -s nullglob
          scripts=(scripts/*.sh)
          if ((${#scripts[@]} == 0)); then
            echo "No scripts/*.sh found" >&2
            exit 1
          fi
          shellcheck "${scripts[@]}"

  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - name: Conformance (executable spec oracle)
        env:
          INTENTPROOF_REPLAY_VERIFY: "1"
          INTENTPROOF_CONFORMANCE_JSON: "1"
        run: bash scripts/run-conformance.sh

      - name: Validate conformance certificate
        run: npm run validate:conformance-certificate

      - name: Upload conformance report and certificate
        uses: actions/upload-artifact@v7
        with:
          name: conformance-artifacts
          path: |
            conformance-report.json
            conformance-certificate.json
          if-no-files-found: error

  schema-compatibility:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Fetch base branch for merge-base
        run: git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" --depth=200

      - name: Classify schema changes vs merge-base
        id: classify
        run: |
          set -euo pipefail
          npm exec -- tsx tools/schema-compatibility-classify.ts \
            --base "origin/${{ github.base_ref }}" \
            --json-out schema-compatibility-report.json
          overall="$(python3 -c "import json; print(json.load(open('schema-compatibility-report.json'))['overall'])")"
          echo "overall=${overall}" >> "${GITHUB_OUTPUT}"
          echo "--- machine-readable report ---"
          cat schema-compatibility-report.json
          {
            echo "## Schema compatibility (vs merge-base)"
            echo ""
            echo "**Overall:** \`${overall}\`"
            echo ""
            echo "Artifact \`schema-compatibility-report.json\` has per-schema classifications."
            echo ""
            echo "**Breaking changes** require PR label \`spec-breaking-approved\`, or set repository variable \`SPEC_SCHEMA_COMPAT_OVERRIDE\` to \`true\` (break-glass only)."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload schema compatibility report
        uses: actions/upload-artifact@v7
        with:
          name: schema-compatibility-report
          path: schema-compatibility-report.json

      - name: Enforce breaking-change policy
        if: |
          steps.classify.outputs.overall == 'BREAKING' &&
          !contains(join(github.event.pull_request.labels.*.name, ','), 'spec-breaking-approved') &&
          vars.SPEC_SCHEMA_COMPAT_OVERRIDE != 'true'
        run: |
          echo "::error::Schema change classified as BREAKING. Add label 'spec-breaking-approved' to this PR, set repository variable SPEC_SCHEMA_COMPAT_OVERRIDE=true (break-glass), or revert the schema change."
          exit 1
