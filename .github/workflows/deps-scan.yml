name: deps-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  allowlist-expiry:
    name: "IntentProof Security: Deps Allowlist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate dependency allowlist expiry dates
        run: bash ./scripts/check-deps-allowlist.sh

  npm-audit:
    name: "IntentProof Security: npm audit"
    needs: allowlist-expiry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v20
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=moderate

  osv-scanner:
    name: "IntentProof Security: OSV-Scanner"
    needs: allowlist-expiry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.2.2
        with:
          scan-args: |-
            --recursive
            --config=.osv-scanner.toml
            --severity=HIGH,CRITICAL
            ./
